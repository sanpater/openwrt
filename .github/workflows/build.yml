name: Build OpenWrt Filogic (jrouter-6x01)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout OpenWrt upstream
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          fetch-depth: 0

      - name: Fetch PR 20557
        run: |
          git fetch origin pull/20557/head:pr20557
          git checkout pr20557

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib gettext git libncurses-dev libssl-dev \
            python3-distutils rsync unzip zlib1g-dev file wget \
            libelf-dev subversion swig time xsltproc jq ccache

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure build
        run: |
          echo "CONFIG_TARGET_mediatek=y" >> .config
          echo "CONFIG_TARGET_mediatek_filogic=y" >> .config
          echo "CONFIG_TARGET_mediatek_filogic_DEVICE_jrouter-6x01=y" >> .config
          echo "CONFIG_PACKAGE_luci=y" >> .config
          make defconfig

      - name: Download sources
        run: make download -j8

      - name: Build firmware
        run: make -j$(nproc)

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-jrouter-6x01
          path: bin/targets/mediatek/filogic/
